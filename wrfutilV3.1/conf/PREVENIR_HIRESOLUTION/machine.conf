#!/bin/bash 

#### CLUSTER ###
export MACHINE='FUGAKU'                                         # Options HM, HYDRA, FUGAKU , FUGAKUPPS
export ICORE=4                                                  # Number of processes per NODE requested to the queue
export ITHREAD=12                                               # Number of openmp threads pre process 
export INODE=12                                                 # Number of NODES requested to the queue
export QUEUESYS='PJM'                                           # Queue system [ SLURMSSH | PBSSSH | PJM | SINGLENODE ]
export QUEUE='small'                                            # Queue name (depends on the machine)
#export MACHINE='HM'                                          # Options HYDRA, FUGAKU , FUGAKUPPS
#export ICORE=48                                                 # Number of processes per NODE requested to the queue
#export ITHREAD=1                                               # Number of openmp threads pre process 
#export INODE=1                                                  # Number of NODES requested to the queue
#export QUEUESYS='SLURMSSH'                                      # Queue system  [ SLURMSSH | PBSSSH | PJM | SINGLENODE ]
#export QUEUE='normal'                                           # Queue name (depends on the machine)

export QEXCLU=0                                                 # If JOBS will be NODE exclusive [Currently not being used]
export QSUB_ROOT=""
export TOTAL_TIME_LIMIT="03:00:00"                              # When running the entire experiment as a JOB, then this sets the overall time limit.
export INTERACTIVE_JOB=1                                        # 1 - means interactive JOB , any other value inidcate regular JOB.

#Fugaku exclusive flags
export LLIO_VOL="/vol0003:/vol0004"                             # Disk volume to be used in the computation nodes [Fugaku PJM only]
export FUGAKU_GROUP="ra000007"                                  # Fugaku_group associated to the user [Fugaku PJM only]
#export FUGAKU_GROUP="hp150019"                                 # Fugaku_group associated to the user [Fugaku PJM only]
export PARALLEL_THREADS=1                                       # Set the number of OMP_THREADS in Fugaku [Fugaku PJM only]
export USETMPDIR=0                                              # Wether we will use shared tmp space in Fugaku [Fugaku PJM only]
export SHAREDCACHESIZE=80Gi                                     # Shared tmp space * #of nodes in Fugaku [Fugaku PJM only]


##############
# Paralelizacion
##############
export LETKFTOTPROC=256                                                 # Number of total procs for LETKF (for SLURMSSH)
export LETKFPROC=$ICORE                                                 # Number of procs per node for LETKF (if LETKFNODE > 1, then ICORE will be assumed)
export LETKFTHREAD=$ITHREAD                                             # Number of OMP THREADS for LETKF
export LETKFNODE=4                                                      # Number of nodes for LETKF
export LETKFWALLTIME="03:00:00"                                         # Maximum wall time for LETKF (for sequeantial queue JOBS only)


export SCALENODE=1                                                        # Number of nodes for WPS (for each ensemble member)
export SCALEPROC=$ICORE                                                   # Number of procs per node for WPS (if WPSNODE > 1, then ICORE will be assumed)
export SCALETHREAD=$ITHREAD                                               # Number of OMP THREADS for WPS 
export SCALEWALLTIME="03:00:00"                                           # Maximum wall time for WPS (for sequeantial queue JOBS only)
export SCALE_RUNTIME_FLAGS="-Wl,-T"                                       # Runtime flags (for example endian conversion)


export WPSNODE=1                                                        # Number of nodes for WPS (for each ensemble member)
export WPSPROC=$ICORE                                                   # Number of procs per node for WPS (if WPSNODE > 1, then ICORE will be assumed)
export WPSTHREAD=$ITHREAD                                               # Number of OMP THREADS for WPS 
export WPSWALLTIME="03:00:00"                                           # Maximum wall time for WPS (for sequeantial queue JOBS only)
export WPS_RUNTIME_FLAGS="-Wl,-T"                                       # Runtime flags (for example endian conversion)

export PERTNODE=1                                                       # Number of nodes for PERT MET EM (usually one, this application do not support multiple nodes)
export PERTPROC=$ICORE                                                  # Number of procs per node for PERT 
export PERTTHREAD=$PERTPROC                                             # Number of OMP THREADS for PERT (must be equal to $PERTPROC)
export PERTWALLTIME="03:00:00"                                          # Maximum wall time for PERT (for sequeantial queue JOBS only)

export WRFNODE=1                                                        # Number of nodes for WRF (for each ensemble member)
export WRFPROC=$ICORE                                                   # Number of procs per node for WRF (if WRFNODE > 1, then ICORE will be assumed)
export WRFTHREAD=$ITHREAD                                               # Number of OMP THREADS for WRF
export WRFWALLTIME="03:00:00"                                           # Maximum wall time for WRF (for sequeantial queue JOBS only)
export WRF_RUNTIME_FLAGS="-Wl,-T"                                       # Runtime flags (for example endian conversion)

#Specify machine dependent enviroment settings
if [ $MACHINE = "FUGAKU"  ] ; then

  export PYTHON=/home/ra000007/a04037/anaconda3/bin/python
  export LD_LIBRARY_PATH=/lib64:/usr/lib64:/opt/FJSVxtclanga/tcsds-latest/lib64:/opt/FJSVxtclanga/tcsds-latest/lib/:/vol0004/ra000007/data/jruiz/comp_libs_fujitsu/netcdf/lib:$LD_LIBRARY_PATH
  export I_MPI_SPAWN=on
  export MPIEXEC=mpiexec
  ulimit -s unlimited

elif [ $MACHINE = "FUGAKUPPS" ] ; then

  . /opt/intel/oneapi/setvars.sh intel64
  export PYTHON=/home/ra000007/a04037/anaconda3/bin/python
  export LD_LIBRARY_PATH=/home/ra000007/a04037/data/comp_libs/grib2/lib/:/home/ra000007/a04037/data/comp_libs/netcdf4/lib/:$LD_LIBRARY_PATH
  export I_MPI_SPAWN=on
  set FI_TCP_IFACE=lo
  export MPIEXEC=mpiexec
  ulimit -s unlimited

elif [ $MACHINE = "HYDRA" ] ; then

  source /opt/load-libs.sh 1
  export PYTHON=/opt/intel/oneapi/intelpython/latest/bin/python
  source activate letkf_wrf
  export LD_LIBRARY_PATH=/home/jruiz/salidas/libpng-1.2.50/lib/:$LD_LIBRARY_PATH
  export HDF5_USE_FILE_LOCKING=FALSE
  export MPIEXEC=mpiexec
  ulimit -s unlimited

elif [ $MACHINE = "HM" ] ; then

#  source /opt/load-libs.sh 1
#  export PYTHON=/opt/intel/oneapi/intelpython/latest/bin/python
#  source activate letkf_wrf
#  export LD_LIBRARY_PATH=/home/jruiz/salidas/libpng-1.2.50/lib/:$LD_LIBRARY_PATH
  export HDF5_USE_FILE_LOCKING=FALSE
  export MPIEXEC=mpiexec
  ulimit -s unlimited

fi

